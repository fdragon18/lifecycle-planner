<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライフサイクルプランニングシート</title>
    <!-- v3.0 - TC年計算修正（12年周期、グループ共通） -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .password-screen {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .password-screen h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .password-screen input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .password-screen button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .password-screen button:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
        }

        .main-app {
            display: none;
        }

        .input-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .input-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label {
            font-weight: bold;
            color: #333;
            white-space: nowrap;
        }

        .input-group input, .input-group select {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            width: 80px;
        }

        .btn-analyze {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-analyze:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-month {
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
        }

        .info-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .info-row {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-label {
            color: #666;
            font-size: 14px;
        }

        .info-value {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .type-f { background: #e3f2fd; color: #1976d2; }
        .type-a { background: #fff3e0; color: #f57c00; }
        .type-m { background: #f3e5f5; color: #7b1fa2; }

        .results-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .results-table th, .results-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .results-table th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
        }

        .results-table th.row-header {
            text-align: left;
            width: 70px;
            font-size: 12px;
        }

        .month-header {
            font-size: 13px;
        }

        .age-row td {
            font-size: 12px;
            color: #666;
        }

        .cycle-cell {
            font-weight: bold;
            font-size: 14px;
        }

        .advice-row td {
            font-size: 11px;
            padding: 8px 4px;
            text-align: left;
            line-height: 1.4;
        }

        .positive {
            color: #2e7d32;
            background: #e8f5e9;
        }

        .negative {
            color: #c62828;
            background: #ffebee;
        }

        .cycle-a { background: #ffecb3; }
        .cycle-b { background: #b3e5fc; }
        .cycle-c { background: #c8e6c9; }
        .cycle-d { background: #f8bbd9; }
        .cycle-e { background: #d1c4e9; }
        .cycle-f { background: #ffe0b2; }
        .cycle-g { background: #b2dfdb; }
        .cycle-x { background: #f5f5f5; }
        .cycle-y { background: #cfd8dc; }
        .cycle-z { background: #ffccbc; }

        .current-month {
            background: #fff59d !important;
            font-weight: bold;
        }

        .tc-year {
            background: #ffcdd2 !important;  /* 薄い赤 */
        }

        .tc-year.current-month {
            background: linear-gradient(135deg, #fff59d 50%, #ffcdd2 50%) !important;
        }

        .graph-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .graph-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .graph-container {
            position: relative;
            width: 100%;
        }

        .graph-container canvas {
            display: block;
            width: 100%;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 15px;
            }

            .input-section {
                padding: 15px;
            }

            .input-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .input-group {
                justify-content: flex-start;
                flex-wrap: nowrap;
            }

            .input-group label {
                width: 70px;
                flex-shrink: 0;
            }

            .input-group select {
                width: 70px;
                padding: 6px 8px;
                font-size: 14px;
            }

            .input-group span {
                font-size: 13px;
                margin: 0 2px;
            }

            .btn-analyze {
                width: 100%;
                margin-top: 5px;
            }

            .info-section {
                padding: 15px;
            }

            .info-row {
                flex-direction: column;
                gap: 8px;
            }

            .info-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 8px 0;
                border-bottom: 1px solid #eee;
            }

            .results-section {
                padding: 10px;
                overflow-x: auto;
            }

            .results-table {
                font-size: 11px;
                min-width: 600px;
            }

            .results-table th,
            .results-table td {
                padding: 6px 4px;
            }

            .graph-section {
                padding: 15px;
            }

            .graph-container canvas {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="passwordScreen" class="password-screen">
            <h2>ライフサイクルプランニング</h2>
            <p style="margin-bottom: 20px; color: #666;">パスワードを入力してください</p>
            <input type="password" id="passwordInput" placeholder="パスワード" onkeypress="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">ログイン</button>
            <p id="errorMsg" class="error-msg" style="display:none;">パスワードが違います</p>
        </div>

        <div id="mainApp" class="main-app">
            <h1>ライフサイクルプランニングシート</h1>

            <div class="input-section">
                <div class="input-row">
                    <div class="input-group">
                        <label>生年月日: </label>
                        <select id="birthYear"></select>
                        <span>年</span>
                        <select id="birthMonth"></select>
                        <span>月</span>
                        <select id="birthDay"></select>
                        <span>日</span>
                    </div>

                    <div class="input-group">
                        <label>起点: </label>
                        <select id="startYear"></select>
                        <span>年</span>
                        <select id="startMonth"></select>
                        <span>月</span>
                    </div>

                    <div class="input-group">
                        <label>表示: </label>
                        <select id="displayCount">
                            <option value="6">6</option>
                            <option value="8">8</option>
                            <option value="10" selected>10</option>
                            <option value="12">12</option>
                        </select>
                        <span>期間</span>
                    </div>
                </div>
                <div class="input-row" style="margin-top: 15px;">
                    <button class="btn-analyze" onclick="analyze()">年分析</button>
                    <button class="btn-analyze btn-month" onclick="analyzeMonth()">月分析</button>
                </div>
            </div>

            <div id="infoSection" class="info-section" style="display:none;">
                <div class="info-row">
                    <div class="info-item">
                        <span class="info-label">個性番号</span>
                        <span id="personalityNumber" class="info-value" style="font-size: 24px; color: #1976d2;"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">タイプ</span>
                        <span id="typeDisplay" class="type-badge"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">派</span>
                        <span id="factionDisplay" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">60類型番号</span>
                        <span id="typeNumber60" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">SP</span>
                        <span id="spNumber" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">年齢</span>
                        <span id="currentAge" class="info-value"></span>
                    </div>
                </div>
            </div>

            <div id="resultsSection" class="results-section" style="display:none;">
                <table class="results-table">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="graphSection" class="graph-section" style="display:none;">
                <div class="graph-title">ライフサイクル</div>
                <div class="graph-container">
                    <canvas id="lifecycleChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // パスワード（簡易認証）
        const PASSWORD = 'lifecycle2024';

        // サイクルデータ
        let cycleData = {};

        // サイクル文字一覧
        const CYCLES = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'X', 'Y', 'Z'];

        // 固定サイクル順序（VBA解析により確定）
        const FIXED_CYCLE_ORDER = ['G', 'X', 'Y', 'Z', 'A', 'B', 'C', 'D', 'E', 'F'];

        // サイクル → グラフY値（Excelの基本グラフ!M2:N11 VLOOKUPテーブルから抽出）
        const CYCLE_VALUES = {
            'A': 4, 'B': 2, 'C': 6, 'D': 5, 'E': 8,
            'F': 9, 'G': 8, 'X': 10, 'Y': 3, 'Z': 4
        };

        // 60類型番号 → 個性番号(1-12) マッピング
        const PERSONALITY_TABLE = [
            5,4,8,6,3,11,5,4,8,6,1,7,9,2,8,6,1,7,9,2,
            12,12,2,9,9,2,12,12,2,9,7,1,6,8,2,9,7,1,6,8,
            4,5,11,3,6,8,4,5,11,3,10,10,3,11,11,3,10,10,3,11
        ];

        // 60類型番号 → SP(1-12) マッピング（表示用）
        const SP_TABLE = [
            7,2,8,5,4,6,9,1,10,11,2,12,11,4,6,7,1,8,7,2,
            8,5,3,10,9,1,10,11,2,12,5,3,6,7,1,8,11,4,12,9,
            3,10,9,1,8,5,4,6,5,3,6,7,2,12,11,4,12,9,3,10
        ];

        // サイクル計算用SP = 60類型番号の下1桁（ExcelのRIGHT(G3,1)に相当）

        // 個性番号 → タイプ マッピング
        // F=前進型, A=調和型, M=堅実型
        // ★=楽観派(奇数), ☆=慎重派(偶数)
        const TYPE_MAPPING = {
            1: 'F★', 2: 'F☆', 3: 'F☆', 4: 'F☆',
            5: 'A★', 6: 'A★', 7: 'A☆', 8: 'A☆',
            9: 'M★', 10: 'M★', 11: 'M☆', 12: 'M☆'
        };

        // SP別サイクルテーブル（Excelライフサイクルマスタ（年）列K以降から抽出）
        // キー: SP % 10
        // 値: 2026年（末尾6）から始まる10年分のサイクル
        // 年サイクルテーブル（SP別、年末尾で参照）
        const SP_CYCLE_TABLE = {
            1: ['C', 'D', 'E', 'F', 'G', 'X', 'Y', 'Z', 'A', 'B'],  // SP=1,11
            2: ['D', 'C', 'F', 'E', 'X', 'G', 'Z', 'Y', 'B', 'A'],  // SP=2,12
            3: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'X', 'Y', 'Z'],  // SP=3
            4: ['B', 'A', 'D', 'C', 'F', 'E', 'X', 'G', 'Z', 'Y'],  // SP=4
            5: ['Y', 'Z', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'X'],  // SP=5
            6: ['Z', 'Y', 'B', 'A', 'D', 'C', 'F', 'E', 'X', 'G'],  // SP=6
            7: ['G', 'X', 'Y', 'Z', 'A', 'B', 'C', 'D', 'E', 'F'],  // SP=7
            8: ['X', 'G', 'Z', 'Y', 'B', 'A', 'D', 'C', 'F', 'E'],  // SP=8
            9: ['E', 'F', 'G', 'X', 'Y', 'Z', 'A', 'B', 'C', 'D'],  // SP=9
            0: ['F', 'E', 'X', 'G', 'Z', 'Y', 'B', 'A', 'D', 'C']   // SP=10
        };

        // 月サイクルテーブル（60類型番号の下1桁別）
        const SP_CYCLE_TABLE_MONTH = {
            0: ['E', 'X', 'G', 'Z', 'Y', 'B', 'A', 'D', 'C', 'F'],
            1: ['D', 'E', 'F', 'G', 'X', 'Y', 'Z', 'A', 'B', 'C'],
            2: ['C', 'F', 'E', 'X', 'G', 'Z', 'Y', 'B', 'A', 'D'],
            3: ['B', 'C', 'D', 'E', 'F', 'G', 'X', 'Y', 'Z', 'A'],
            4: ['A', 'D', 'C', 'F', 'E', 'X', 'G', 'Z', 'Y', 'B'],
            5: ['Z', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'X', 'Y'],
            6: ['Y', 'B', 'A', 'D', 'C', 'F', 'E', 'X', 'G', 'Z'],
            7: ['X', 'Y', 'Z', 'A', 'B', 'C', 'D', 'E', 'F', 'G'],
            8: ['G', 'Z', 'Y', 'B', 'A', 'D', 'C', 'F', 'E', 'X'],
            9: ['F', 'G', 'X', 'Y', 'Z', 'A', 'B', 'C', 'D', 'E']
        };

        // TC年（不安定期）計算
        // 各グループの基準年オフセット（1900年から）
        const TC_GROUP_OFFSETS = [10, 8, 18, 16, 14, 0]; // グループ0-5

        function getTCYears(type60, startYear, endYear) {
            const groupIndex = Math.floor((type60 - 1) / 10);  // 0-5

            // グループ基準年（同じグループ内は全員同じTC年）
            const baseYear = 1900 + TC_GROUP_OFFSETS[groupIndex];

            // 12年周期で繰り返し
            const tcYears = new Set();
            for (let year = baseYear; year <= endYear; year += 12) {
                if (year >= startYear) {
                    tcYears.add(year);
                    tcYears.add(year + 1);  // TC年は2年連続
                }
            }
            return tcYears;
        }

        function isTCYear(type60, year) {
            const tcYears = getTCYears(type60, year - 1, year + 1);
            return tcYears.has(year);
        }

        // TC月（不安定期）の月を取得
        // 60類型番号のグループ別に2ヶ月のTC期間がある
        const TC_MONTH_TABLE = {
            0: [10, 11],  // 1-10: 10月・11月
            1: [8, 9],    // 11-20: 8月・9月
            2: [6, 7],    // 21-30: 6月・7月
            3: [4, 5],    // 31-40: 4月・5月
            4: [2, 3],    // 41-50: 2月・3月
            5: [12, 1]    // 51-60: 12月・1月
        };

        function isTCMonth(type60, month) {
            const groupIndex = Math.floor((type60 - 1) / 10);  // 0-5
            const tcMonths = TC_MONTH_TABLE[groupIndex];
            return tcMonths.includes(month);
        }

        // プルダウン初期化
        function populateDropdowns() {
            const now = new Date();
            const currentYear = now.getFullYear();

            // 生年: 1920年〜現在年
            const birthYearSelect = document.getElementById('birthYear');
            for (let y = currentYear; y >= 1920; y--) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                birthYearSelect.appendChild(opt);
            }
            birthYearSelect.value = 1993; // デフォルト

            // 月: 1〜12
            const birthMonthSelect = document.getElementById('birthMonth');
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                birthMonthSelect.appendChild(opt);
            }
            birthMonthSelect.value = 10; // デフォルト

            // 日: 1〜31
            const birthDaySelect = document.getElementById('birthDay');
            for (let d = 1; d <= 31; d++) {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                birthDaySelect.appendChild(opt);
            }
            birthDaySelect.value = 6; // デフォルト

            // 起点年: 1950年〜現在年+20年
            const startYearSelect = document.getElementById('startYear');
            for (let y = currentYear + 20; y >= 1950; y--) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                startYearSelect.appendChild(opt);
            }
            startYearSelect.value = currentYear; // デフォルト

            // 起点月: 1〜12
            const startMonthSelect = document.getElementById('startMonth');
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                startMonthSelect.appendChild(opt);
            }
            startMonthSelect.value = now.getMonth() + 1; // 今月
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', async () => {
            // プルダウン初期化
            populateDropdowns();

            // サイクルデータを読み込み
            try {
                const response = await fetch('cycle_data.json');
                cycleData = await response.json();
                console.log('Loaded cycle data:', Object.keys(cycleData).length, 'entries');
            } catch (e) {
                console.error('Failed to load cycle data:', e);
            }

            // セッションチェック
            if (sessionStorage.getItem('authenticated') === 'true') {
                showMainApp();
            }
        });

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                sessionStorage.setItem('authenticated', 'true');
                showMainApp();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function showMainApp() {
            document.getElementById('passwordScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        // Excelシリアル日付を計算（1900年1月1日を1とする）
        function excelSerialDate(year, month, day) {
            // JavaScript Date: 1970年1月1日が基準
            // Excel Date: 1900年1月1日が1（1899年12月31日が0）
            const date = new Date(year, month - 1, day);
            const excelEpoch = new Date(1899, 11, 30); // Excelの基準日
            const diffMs = date - excelEpoch;
            return Math.floor(diffMs / (1000 * 60 * 60 * 24));
        }

        // 60類型番号を計算
        function calculate60TypeNumber(year, month, day) {
            const serialDate = excelSerialDate(year, month, day);
            return ((serialDate + 8) % 60) + 1;
        }

        // 個性番号を取得（60類型番号から）
        function getPersonalityNumber(typeNumber60) {
            return PERSONALITY_TABLE[typeNumber60 - 1];
        }

        // SP値を取得（表示用、SP_TABLEから）
        function getSP(typeNumber60) {
            return SP_TABLE[typeNumber60 - 1];
        }

        // サイクル計算用SP（60類型番号の下1桁、0の場合は10）
        function getSPForCycle(typeNumber60) {
            const lastDigit = typeNumber60 % 10;
            return lastDigit === 0 ? 10 : lastDigit;
        }

        // タイプコードを取得（個性番号と年齢から）
        function getTypeCode(personalityNum, age) {
            let baseType = TYPE_MAPPING[personalityNum];
            if (!baseType) baseType = 'F★';

            // 10歳未満はcタイプ
            if (age < 10) {
                return baseType.charAt(0) + 'c';
            }
            return baseType;
        }

        // 派を判定
        function getFaction(personalityNum) {
            return (personalityNum % 2 === 1) ? '楽観派' : '慎重派';
        }

        // 年のサイクルを計算（Excelルックアップテーブル方式）
        function calculateYearlyCycle(sp, startYear, targetYear) {
            // 起点年からの経過年数を計算
            const yearsElapsed = targetYear - startYear;

            // レベルは経過年数の3分割（10年ごとにレベルが変わる）
            const level = (Math.floor(Math.abs(yearsElapsed) / 10) % 3) + 1;

            // SP下1桁でテーブル行を決定
            const spKey = sp % 10;
            const baseCycles = SP_CYCLE_TABLE[spKey];

            // 年の下1桁からインデックスを計算
            // テーブルは2026年（末尾6）=インデックス0から始まる
            const yearDigit = targetYear % 10;
            const cycleIndex = (yearDigit + 4) % 10;  // 6→0, 7→1, ..., 5→9
            const cycle = baseCycles[cycleIndex];

            return {
                cycle: cycle,
                level: level
            };
        }

        // 年齢を計算
        function calculateAge(birthYear, birthMonth, birthDay, targetYear, targetMonth) {
            let age = targetYear - birthYear;
            if (targetMonth < birthMonth || (targetMonth === birthMonth && 1 < birthDay)) {
                age--;
            }
            return age;
        }

        // サイクルに対応するアドバイスを取得
        function getAdvice(typeCode, cycle, level) {
            // コード形式: (F☆)A1
            const code = `(${typeCode})${cycle}${level}`;

            const advice = cycleData[code];
            if (advice) {
                return advice;
            }

            // フォールバック: 他のタイプバリエーションを試す
            const baseType = typeCode.charAt(0);
            for (const sym of ['★', '☆', 'c']) {
                const fallbackCode = `(${baseType}${sym})${cycle}${level}`;
                if (cycleData[fallbackCode]) {
                    return cycleData[fallbackCode];
                }
            }

            return { positive: '', negative: '' };
        }

        // 分析実行
        function analyze() {
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const birthMonth = parseInt(document.getElementById('birthMonth').value);
            const birthDay = parseInt(document.getElementById('birthDay').value);
            const startYear = parseInt(document.getElementById('startYear').value);

            if (!birthYear || !birthMonth || !birthDay || !startYear) {
                alert('すべての項目を入力してください');
                return;
            }

            // 60類型番号を計算
            const typeNumber60 = calculate60TypeNumber(birthYear, birthMonth, birthDay);

            // 個性番号を取得
            const personalityNum = getPersonalityNumber(typeNumber60);

            // SP値を取得（1-12、表示用）
            const sp = getSP(typeNumber60);

            // サイクル順序決定用SP（1-10）: 60類型番号の下1桁
            const spForCycle = getSPForCycle(typeNumber60);

            // 現在の年齢を計算（年分析なので起点年の1月時点）
            const currentAge = calculateAge(birthYear, birthMonth, birthDay, startYear, 1);

            // タイプコードを取得
            const typeCode = getTypeCode(personalityNum, currentAge);

            // 派を取得
            const faction = getFaction(personalityNum);

            // 現在のサイクル情報を取得（起点年）
            const currentCycleInfo = calculateYearlyCycle(spForCycle, startYear, startYear);

            // 情報を表示
            document.getElementById('infoSection').style.display = 'block';
            document.getElementById('personalityNumber').textContent = personalityNum;
            document.getElementById('typeNumber60').textContent = typeNumber60;
            document.getElementById('spNumber').textContent = sp;
            document.getElementById('currentAge').textContent = `${currentAge}歳`;
            document.getElementById('factionDisplay').textContent = faction;

            const typeDisplay = document.getElementById('typeDisplay');
            const baseType = typeCode.charAt(0);
            typeDisplay.textContent = `(${typeCode})`;
            typeDisplay.className = 'type-badge type-' + baseType.toLowerCase();

            // デバッグ情報（コンソール）
            console.log('60類型番号:', typeNumber60, '個性番号:', personalityNum, 'SP(表示):', sp, 'SP(cycle):', spForCycle, 'タイプ:', typeCode);

            // 表示期間数を取得
            const displayCount = parseInt(document.getElementById('displayCount').value);

            // 年データを生成
            const years = [];
            const currentYearNow = new Date().getFullYear();

            for (let i = 0; i < displayCount; i++) {
                const y = startYear + i;
                const age = calculateAge(birthYear, birthMonth, birthDay, y, birthMonth);
                const cycleInfo = calculateYearlyCycle(spForCycle, startYear, y);
                const advice = getAdvice(typeCode, cycleInfo.cycle, cycleInfo.level);

                years.push({
                    year: y,
                    age: age,
                    cycle: cycleInfo.cycle,
                    level: cycleInfo.level,
                    positive: advice.positive,
                    negative: advice.negative,
                    isCurrent: (y === currentYearNow),
                    isTC: isTCYear(typeNumber60, y)  // TC年フラグ
                });
            }

            // テーブルを生成
            renderYearTable(years);
            document.getElementById('resultsSection').style.display = 'block';

            // グラフを生成（レイアウト計算後に描画）
            document.getElementById('graphSection').style.display = 'block';
            setTimeout(() => renderLifecycleChart(years), 50);
        }

        // 月サイクルを計算
        function calculateMonthlyCycle(typeNumber60, targetYear, targetMonth) {
            // 60類型番号の下1桁でテーブル行を決定
            const spKey = typeNumber60 % 10;
            const baseCycles = SP_CYCLE_TABLE_MONTH[spKey];

            // 絶対的な月インデックスで計算（年サイクルと同様のロジック）
            const cycleIndex = (targetYear * 12 + targetMonth - 1) % 10;
            return baseCycles[cycleIndex];
        }

        // 月分析
        function analyzeMonth() {
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const birthMonth = parseInt(document.getElementById('birthMonth').value);
            const birthDay = parseInt(document.getElementById('birthDay').value);
            const startYear = parseInt(document.getElementById('startYear').value);
            const startMonth = parseInt(document.getElementById('startMonth').value);

            if (!birthYear || !birthMonth || !birthDay || !startYear || !startMonth) {
                alert('すべての項目を入力してください');
                return;
            }

            // 60類型番号を計算
            const typeNumber60 = calculate60TypeNumber(birthYear, birthMonth, birthDay);

            // 個性番号を取得
            const personalityNum = getPersonalityNumber(typeNumber60);

            // SP値を取得（表示用）
            const sp = getSP(typeNumber60);

            // 現在の年齢
            const currentAge = calculateAge(birthYear, birthMonth, birthDay, startYear, startMonth);

            // タイプコードを取得
            const typeCode = getTypeCode(personalityNum, currentAge);

            // 派を取得
            const faction = getFaction(personalityNum);

            // 情報を表示
            document.getElementById('infoSection').style.display = 'block';
            document.getElementById('personalityNumber').textContent = personalityNum;
            document.getElementById('typeNumber60').textContent = typeNumber60;
            document.getElementById('spNumber').textContent = sp;
            document.getElementById('currentAge').textContent = `${currentAge}歳`;
            document.getElementById('factionDisplay').textContent = faction;

            const typeDisplay = document.getElementById('typeDisplay');
            const baseType = typeCode.charAt(0);
            typeDisplay.textContent = `(${typeCode})`;
            typeDisplay.className = 'type-badge type-' + baseType.toLowerCase();

            // 表示期間数を取得
            const displayCount = parseInt(document.getElementById('displayCount').value);

            // 月データを生成
            const months = [];
            const now = new Date();
            const currentYearNow = now.getFullYear();
            const currentMonthNow = now.getMonth() + 1;

            for (let i = 0; i < displayCount; i++) {
                let y = startYear;
                let m = startMonth + i;
                while (m > 12) {
                    m -= 12;
                    y++;
                }

                const cycle = calculateMonthlyCycle(typeNumber60, y, m);
                const age = calculateAge(birthYear, birthMonth, birthDay, y, m);
                const advice = getAdvice(typeCode, cycle, 1);

                months.push({
                    year: y,
                    month: m,
                    age: age,
                    cycle: cycle,
                    positive: advice.positive,
                    negative: advice.negative,
                    isCurrent: (y === currentYearNow && m === currentMonthNow),
                    isTC: isTCMonth(typeNumber60, m)
                });
            }

            // テーブルを生成
            renderMonthTable(months);
            document.getElementById('resultsSection').style.display = 'block';

            // グラフを生成
            document.getElementById('graphSection').style.display = 'block';
            setTimeout(() => renderLifecycleChartMonth(months), 50);
        }

        // 月分析テーブルを描画
        function renderMonthTable(months) {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            // ヘッダー
            let headerHTML = '<tr><th class="row-header"></th>';

                const tcCls = m.isTC ? 'tc-year' : '';

                headerHTML += `<th class="month-header ${tcCls} ${curCls}">${m.year}年${m.month}月</th>`;

            headerHTML += '</tr>';
            header.innerHTML = headerHTML;

            // 年齢行
            let ageRowHTML = '<tr class="age-row"><td class="row-header">年齢</td>';
            months.forEach(m => {
                const tcCls = m.isTC ? 'tc-year' : '';
                const curCls = m.isCurrent ? 'current-month' : '';
                ageRowHTML += `<td class="${tcCls} ${curCls}">${m.age}歳</td>`;
            });
            ageRowHTML += '</tr>';

            // サイクル行
            let cycleRowHTML = '<tr><td class="row-header">サイクル</td>';
            months.forEach(m => {
                const tcCls = m.isTC ? 'tc-year' : '';
                const curCls = m.isCurrent ? 'current-month' : '';
                cycleRowHTML += `<td class="cycle-cell cycle-${m.cycle.toLowerCase()} ${tcCls} ${curCls}">${m.cycle}</td>`;
            });
            cycleRowHTML += '</tr>';

            // 良い面
            let positiveRowHTML = '<tr class="advice-row positive-row"><td class="row-header">良い面</td>';
            months.forEach(m => {
                const tcCls = m.isTC ? 'tc-year' : '';
                const curCls = m.isCurrent ? 'current-month' : '';
                positiveRowHTML += `<td class="${tcCls} ${curCls}">${m.positive}</td>`;
            });

            // 注意点
            let negativeRowHTML = '<tr class="advice-row negative-row"><td class="row-header">注意点</td>';

                const tcCls = m.isTC ? 'tc-year' : '';
                const curCls = m.isCurrent ? 'current-month' : '';

            body.innerHTML = ageRowHTML + cycleRowHTML + positiveRowHTML + negativeRowHTML;
        }

        // 月分析グラフを描画
        function renderLifecycleChartMonth(months) {
            const canvas = document.getElementById('lifecycleChart');
            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;

            canvas.width = container.offsetWidth;
            canvas.height = 320;

            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 30, right: 40, bottom: 70, left: 50 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // 背景
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);

            const yMax = 10;
            const stepWidth = chartWidth / (months.length - 1);

            const points = months.map((m, i) => ({
                x: padding.left + (i / (months.length - 1)) * chartWidth,
                y: padding.top + chartHeight - ((CYCLE_VALUES[m.cycle] || 5) / yMax) * chartHeight,
                cycle: m.cycle,
                year: m.year,
                month: m.month,
                isCurrent: m.isCurrent,
                isTC: m.isTC
            }));

            // TC月の背景帯を描画（赤）
            points.forEach((p, i) => {
                if (p.isTC) {
                    ctx.fillStyle = 'rgba(244, 67, 54, 0.15)';
                    let x, w;
                    if (i === 0) {
                        x = padding.left;
                        w = stepWidth / 2;
                    } else if (i === points.length - 1) {
                        x = p.x - stepWidth / 2;
                        w = stepWidth / 2 + padding.right;
                    } else {
                        x = p.x - stepWidth / 2;
                        w = stepWidth;
                    }
                    ctx.fillRect(x, padding.top, w, chartHeight);
                }
            });

            // チャートエリアの枠
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.strokeRect(padding.left, padding.top, chartWidth, chartHeight);

            // 横グリッド線
            ctx.strokeStyle = '#e8e8e8';
            for (let i = 1; i < 10; i++) {
                const y = padding.top + (i / 10) * chartHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(padding.left + chartWidth, y);
                ctx.stroke();
            }

            // 縦グリッド線
            points.forEach((p, idx) => {
                if (idx > 0 && idx < points.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, padding.top);
                    ctx.lineTo(p.x, padding.top + chartHeight);
                    ctx.stroke();
                }
            });

            // Y軸ラベル
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 10; i += 2) {
                const y = padding.top + chartHeight - (i / 10) * chartHeight;
                ctx.fillText(i.toString(), padding.left - 10, y + 4);
            }

            // 折れ線
            ctx.beginPath();
            ctx.strokeStyle = '#43a047';
            ctx.lineWidth = 3;
            points.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            // データポイント
            points.forEach(p => {
                ctx.beginPath();
                ctx.fillStyle = p.isCurrent ? '#ff9800' : '#43a047';
                ctx.arc(p.x, p.y, p.isCurrent ? 8 : 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // X軸ラベル（サイクル文字）
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            points.forEach(p => {
                ctx.fillText(p.cycle, p.x, height - padding.bottom + 20);
            });

            // X軸ラベル（月）
            ctx.fillStyle = '#666';
            ctx.font = '10px sans-serif';
            points.forEach(p => {
                ctx.fillText(`${p.month}月`, p.x, height - padding.bottom + 38);
            });
        }

        // 年分析テーブルを描画
        function renderYearTable(years) {
            const header = document.getElementById('tableHeader');

            // ヘッダー
            let headerHTML = '<tr><th class="row-header"></th>';

            years.forEach(y => {

            // ネガティブ行（レベル1）
            let negative1HTML = '<tr class="advice-row"><td class="row-header" style="color:#c62828;">注意点 Lv1</td>';

                negative1HTML += `<td class="negative ${tcCls} ${curCls}">${y.negative || '-'}</td>`;
            });
            negative1HTML += '</tr>';

            body.innerHTML = ageRowHTML + cycleRowHTML + positive1HTML + negative1HTML;
        }
